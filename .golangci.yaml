version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - nolintlint
    - revive
    - bodyclose
    - exhaustive
    - gosec
    - prealloc

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  govet:
    shadow: true
  revive:
    rules:
      - name: unexported-return
        disabled: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  exhaustive:
    default-signifies-exhaustive: true
  misspell:
    locale: US

issues:
  exclude-dirs:
    - docs
    - api/proto
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck